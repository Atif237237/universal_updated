name: universal_science_academy
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.3
  firebase_auth: ^5.3.1
  intl: ^0.20.2
  month_picker_dialog: ^6.4.1
  flutter_speed_dial: ^7.0.0
  uuid: ^4.5.1
  printing: ^5.14.2
  open_filex: ^4.5.0 
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.5
  url_launcher: ^6.3.2
  pdf: ^3.11.3
  excel: ^4.0.6
  share_plus: ^11.1.0
  permission_handler: ^12.0.1
  google_fonts: ^8.0.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  # Fixed font configuration
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"